<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timestamp Microservice</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 0 auto; padding: 20px; }
        code { background: #f4f4f4; padding: 2px 5px; }
        pre { background: #333; color: #fff; padding: 10px; }
    </style>
</head>
<body>
    <h1>Timestamp Microservice</h1>
    
    <h2>Usage:</h2>
    <ul>
        <li><code>/api/2015-12-25</code> - returns JSON with unix and utc time</li>
        <li><code>/api/1451001600000</code> - works with Unix timestamps</li>
        <li><code>/api/</code> - returns current time</li>
    </ul>

    <h2>Example response:</h2>
    <pre>{"unix":1451001600000,"utc":"Fri, 25 Dec 2015 00:00:00 GMT"}</pre>
</body>
</html>
